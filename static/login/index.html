<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tlog - Login</title>
    <link rel="stylesheet" href="/app/login/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">Login</div>
        <div class="navbar-brand">tlog</div>
    </nav>
    <div class="login-container">
        <div class="login-card">
            <h2>Iniciar Sesión</h2>
            <form>
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password">
                </div>
                <button type="button" onclick="loginBtnHandler()" class="login-button">Ingresar</button>
                <div class="login-links">
                    <a href="#">Nuevo usuario</a>
                    <a href="#">¿Olvidó su contraseña?</a>
                </div>
            </form>
        </div>
    </div>

    <script src="/app/login/script.js"></script>
</body>
</html>
